steps:
  - name: 'node:20'
    entrypoint: npm
    args: ['ci']

  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build', '--workspace=packages/shared']

  - name: 'node:20'
    entrypoint: bash
    args:
      - '-c'
      - 'echo "$$WEB_ENV_PRODUCTION" > apps/web/.env.production'
    secretEnv: ['WEB_ENV_PRODUCTION']

  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build', '--workspace=apps/web']

  - name: 'node:20'
    entrypoint: bash
    args:
      - '-c'
      - 'npx firebase-tools deploy --only hosting --project=caroacidades --token=$$FIREBASE_TOKEN'
    secretEnv: ['FIREBASE_TOKEN']

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/web-env-production/versions/latest
      env: 'WEB_ENV_PRODUCTION'
    - versionName: projects/$PROJECT_ID/secrets/firebase-ci-token/versions/latest
      env: 'FIREBASE_TOKEN'

options:
  logging: CLOUD_LOGGING_ONLY
